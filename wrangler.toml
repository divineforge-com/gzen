# Root wrangler is intentionally NOT used for gzen.io page builds.
# Each app deploys from its own Cloudflare Pages project settings.
#
# Cloudflare Pages — project "gzen" (gzen.io):
#   Root directory: apps/gzen
#   Build command:  npm run build
#   Build output:   dist
#   Node version:   22 (or current LTS)
#
# Cloudflare Pages — project "gzen-om" (om.gzen.io):
#   Root directory: apps/gzen-om
#   Build command:  hugo --gc --minify
#   Build output:   public
name = "gzen-monorepo"
compatibility_date = "2026-05-10"
