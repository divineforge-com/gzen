baseURL = "https://gzen.io/"
title = "GrowZen"
theme = "blowfish"
defaultContentLanguage = "zh"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true
summaryLength = 70

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = false
  [markup.highlight]
    style = "monokai"
    noClasses = false

[outputs]
  home    = ["HTML", "JSON"]   # JSON needed for Blowfish search
  section = ["HTML"]
  taxonomy = ["HTML"]
  term    = ["HTML"]

[taxonomies]
  tag      = "tags"
  category = "categories"

[languages]
  [languages.zh]
    languageName = "中文"
    weight       = 1
    title        = "GrowZen · 善聚慧生"
    contentDir   = "content/zh"
    [languages.zh.params]
      displayName = "中文"
      subtitle    = "善聚慧生"
      description = "GrowZen 生态 — 倡导能量流动，践行工具之道。传统智慧与现代软件工程的完美交织。"
      heroKicker  = "倡导能量流动，践行工具之道"
      heroTitle   = "善聚慧生 · GrowZen"
      heroLead    = "GrowZen 是一个智慧与工具共生的生态。我们倡导身心能量的顺畅流动，通过在云端、DevOps 与 AI 中正确克制地运用工具，将传统哲学与现代技术转化为真实的生命力与现实影响力。"
      heroAction  = "关于本站"
      languageNote = "中文为主，English 与 日本語同步同行。"

  [languages.en]
    languageName = "English"
    weight       = 2
    title        = "GrowZen · 善聚慧生"
    contentDir   = "content/en"
    [languages.en.params]
      displayName = "English"
      subtitle    = "Where Goodness Gathers, Wisdom Grows"
      description = "GrowZen Ecosystem — Advocating energy flow and the right use of tools. Bridging ancient wisdom and modern engineering."
      heroKicker  = "Energy Flow & Right Tool Use"
      heroTitle   = "GrowZen Ecosystem"
      heroLead    = "GrowZen is an ecosystem merging ancient wisdom with modern engineering. We advocate for the natural flow of physical and digital energy, practicing simplicity and restraint in Cloud, DevOps, and AI to achieve meaningful impact."
      heroAction  = "About Us"
      languageNote = "Chinese first, then English and Japanese in step."

  [languages.ja]
    languageName = "日本語"
    weight       = 3
    title        = "GrowZen · 善集慧生"
    contentDir   = "content/ja"
    [languages.ja.params]
      displayName = "日本語"
      subtitle    = "善集慧生"
      description = "GrowZen エコシステム — エネルギーの流動と正しい道具の道。伝統的な知恵とソフトウェアエンジニアリングの融合。"
      heroKicker  = "エネルギーの流動と正しい道具の道"
      heroTitle   = "GrowZen エコシステム"
      heroLead    = "GrowZen は、伝統的な知恵と現代のエンジニアリングを融合させたエコシステムです。身体とデジタルのエネルギー流動を促し、クラウド、DevOps、AIにおいて道具を適切に制約し、現実的な影響力をもたらします。"
      heroAction  = "当サイトについて"
      languageNote = "中文を中心に、English と 日本語で共に歩みます。"


[params]
  # These are read by our custom partials, not by Blowfish directly
  brand          = "GrowZen"
  brandSubtitle  = "聚善"
  brandTagline   = "禅生定，定生慧"
  lotusEmoji     = "🪷"

  [params.ecosystem]
    ki          = "https://ki.gzen.io"
    learn       = "https://learn.gzen.io"
    invest      = "https://invest.gzen.io"


