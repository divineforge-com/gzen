<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
</head>
<body>
  <header class="top">
    <a class="brand" href="/">{{ .Site.Params.brand | default "唵" }} <span>gZen Om</span></a>
    <nav>
      <a href="/">首页</a>
      <a href="/notes/">笔记</a>
      <a href="/about/">关于</a>
      <a href="https://gzen.io/">门户</a>
    </nav>
  </header>
  <main class="wrap">
    {{ block "main" . }}{{ end }}
  </main>
  <footer class="foot">
    <p>{{ .Site.Params.subtitle }} · <a href="https://gzen.io">K.I.L.O.</a></p>
  </footer>
</body>
</html>
