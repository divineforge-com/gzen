<div class="infographic">
<svg viewBox="0 0 720 500" style="width:100%;height:auto;font-family:var(--font-diagram)">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f0b429"/>
    </marker>
    <marker id="arr-teal" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#38b2ac"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#48bb78"/>
    </marker>
  </defs>
  <text x="360" y="38" text-anchor="middle" font-size="26" fill="#f0b429" font-weight="700">Dividend Income — How It Works</text>
  <!-- Company box -->
  <rect x="20" y="70" width="180" height="100" rx="8" fill="rgba(66,153,225,0.15)" stroke="#4299e1" stroke-width="2"/>
  <text x="110" y="100" text-anchor="middle" font-size="20" fill="#4299e1" font-weight="700">🏢 Company</text>
  <text x="110" y="122" text-anchor="middle" font-size="15" fill="#4299e1">Earns profit</text>
  <text x="110" y="141" text-anchor="middle" font-size="15" fill="#4299e1">Declares dividend</text>
  <text x="110" y="160" text-anchor="middle" font-size="14" fill="#4299e1" opacity="0.7">e.g. RM0.10/share</text>
  <!-- Arrow Company → Investor -->
  <line x1="200" y1="120" x2="260" y2="120" stroke="#f0b429" stroke-width="2" marker-end="url(#arr)"/>
  <text x="230" y="112" text-anchor="middle" font-size="13" fill="#f0b429">pays</text>
  <!-- Investor box -->
  <rect x="260" y="70" width="180" height="100" rx="8" fill="rgba(240,180,41,0.15)" stroke="#f0b429" stroke-width="2"/>
  <text x="350" y="100" text-anchor="middle" font-size="20" fill="#f0b429" font-weight="700">👤 Investor</text>
  <text x="350" y="122" text-anchor="middle" font-size="15" fill="#f0b429">Receives cash</text>
  <text x="350" y="141" text-anchor="middle" font-size="15" fill="#f0b429">dividend payout</text>
  <text x="350" y="160" text-anchor="middle" font-size="14" fill="#f0b429" opacity="0.7">into brokerage acc</text>
  <!-- Arrow Investor → choices -->
  <line x1="440" y1="120" x2="500" y2="120" stroke="#38b2ac" stroke-width="2" marker-end="url(#arr-teal)"/>
  <text x="470" y="112" text-anchor="middle" font-size="13" fill="#38b2ac">chooses</text>
  <!-- Spend option -->
  <rect x="500" y="60" width="195" height="55" rx="8" fill="rgba(252,129,74,0.12)" stroke="#fc814a" stroke-width="1.5"/>
  <text x="597" y="82" text-anchor="middle" font-size="17" fill="#fc814a" font-weight="600">💸 Spend / Withdraw</text>
  <text x="597" y="103" text-anchor="middle" font-size="14" fill="#fc814a" opacity="0.8">Passive income lifestyle</text>
  <!-- DRIP option -->
  <rect x="500" y="130" width="195" height="55" rx="8" fill="rgba(72,187,120,0.15)" stroke="#48bb78" stroke-width="2"/>
  <text x="597" y="152" text-anchor="middle" font-size="17" fill="#48bb78" font-weight="700">🔄 DRIP — Reinvest</text>
  <text x="597" y="173" text-anchor="middle" font-size="14" fill="#48bb78" opacity="0.8">Buy more shares → compounding</text>
  <!-- DRIP loop arrow -->
  <path d="M 597,185 Q 650,230 630,270 Q 610,310 350,310 Q 200,310 180,220 Q 165,160 200,120" fill="none" stroke="#48bb78" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-green)"/>
  <text x="620" y="265" font-size="14" fill="#48bb78" opacity="0.8">Compounding</text>
  <text x="620" y="283" font-size="14" fill="#48bb78" opacity="0.8">loop 🔁</text>
  <!-- Key Dates Timeline -->
  <text x="360" y="345" text-anchor="middle" font-size="20" font-weight="700" style="fill:var(--svg-nfg)">📅 Key Dividend Dates</text>
  <line x1="50" y1="370" x2="670" y2="370" stroke-width="2" style="stroke:var(--svg-n30)"/>
  <!-- Declaration Date -->
  <circle cx="80" cy="370" r="7" fill="#4299e1"/>
  <line x1="80" y1="363" x2="80" y2="330" stroke="#4299e1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="80" y="325" text-anchor="middle" font-size="16" fill="#4299e1" font-weight="700">Declaration</text>
  <text x="80" y="345" text-anchor="middle" font-size="14" fill="#4299e1" opacity="0.7">Date</text>
  <text x="80" y="393" text-anchor="middle" font-size="13" style="fill:var(--svg-n50)">Board announces</text>
  <!-- Ex-Dividend Date -->
  <circle cx="230" cy="370" r="7" fill="#f0b429"/>
  <line x1="230" y1="363" x2="230" y2="330" stroke="#f0b429" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="230" y="325" text-anchor="middle" font-size="16" fill="#f0b429" font-weight="700">Ex-Dividend</text>
  <text x="230" y="345" text-anchor="middle" font-size="14" fill="#f0b429" opacity="0.7">Date</text>
  <text x="230" y="393" text-anchor="middle" font-size="13" style="fill:var(--svg-n50)">Must own BEFORE</text>
  <!-- Record Date -->
  <circle cx="390" cy="370" r="7" fill="#ed64a6"/>
  <line x1="390" y1="363" x2="390" y2="330" stroke="#ed64a6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="390" y="325" text-anchor="middle" font-size="16" fill="#ed64a6" font-weight="700">Record</text>
  <text x="390" y="345" text-anchor="middle" font-size="14" fill="#ed64a6" opacity="0.7">Date</text>
  <text x="390" y="393" text-anchor="middle" font-size="13" style="fill:var(--svg-n50)">Shareholder list</text>
  <!-- Payment Date -->
  <circle cx="550" cy="370" r="7" fill="#48bb78"/>
  <line x1="550" y1="363" x2="550" y2="330" stroke="#48bb78" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="550" y="325" text-anchor="middle" font-size="16" fill="#48bb78" font-weight="700">Payment</text>
  <text x="550" y="345" text-anchor="middle" font-size="14" fill="#48bb78" opacity="0.7">Date</text>
  <text x="550" y="393" text-anchor="middle" font-size="13" style="fill:var(--svg-n50)">Cash in account!</text>
  <!-- Yield formula -->
  <rect x="50" y="420" width="300" height="65" rx="8" fill="rgba(240,180,41,0.1)" stroke="#f0b429" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="200" y="444" text-anchor="middle" font-size="16" fill="#f0b429" font-weight="700">Dividend Yield Formula</text>
  <text x="200" y="466" text-anchor="middle" font-size="18" fill="#f0b429">Yield = (Annual Div / Price) × 100</text>
  <text x="200" y="480" text-anchor="middle" font-size="14" fill="#f0b429" opacity="0.7">e.g. RM0.40 / RM4.00 = 10% yield 🎯</text>
  <!-- Target yield -->
  <rect x="380" y="420" width="295" height="65" rx="8" fill="rgba(72,187,120,0.1)" stroke="#48bb78" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="527" y="444" text-anchor="middle" font-size="16" fill="#48bb78" font-weight="700">Target Yield Range</text>
  <text x="527" y="465" text-anchor="middle" font-size="15" fill="#48bb78">MY: 4–8% · US: 2–5% (aristocrats)</text>
  <text x="527" y="481" text-anchor="middle" font-size="14" fill="#48bb78" opacity="0.7">High yield warning: check payout ratio!</text>
</svg>
</div>
