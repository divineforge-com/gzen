<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }} — Investment Knowledge Infographics{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <script>
    (function(){
      var t = localStorage.getItem('gzen-theme') || 'dark';
      var l = localStorage.getItem('gzen-lang') || 'en';
      document.documentElement.setAttribute('data-theme', t);
      document.documentElement.setAttribute('lang', l === 'zh' ? 'zh-CN' : 'en');
    })();
  </script>
</head>
<body>
{{ partial "navbar.html" . }}
<main class="page-content">
  {{ block "main" . }}{{ end }}
</main>
{{ partial "global-disclaimer.html" . }}
{{ partial "footer.html" . }}
<!-- BuyMeACoffee floating widget -->
<a class="bmc-float" href="https://buymeacoffee.com/divineforge" target="_blank" rel="noopener noreferrer" aria-label="Support on Buy Me a Coffee">
  <span class="bmc-icon">☕</span>
  <span data-en="Support Us" data-zh="支持我们">Support Us</span>
</a>
<script src="/js/main.js"></script>
</body>
</html>
