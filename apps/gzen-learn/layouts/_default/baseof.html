<!DOCTYPE html>
<html lang="{{ if eq .Params.language "japanese" }}ja{{ else if eq .Params.language "russian" }}ru{{ else }}en{{ end }}">
<head>
  {{ partial "head.html" . }}
</head>
<body class="{{ with .Params.language }}lang-{{ . }}{{ end }}">
  {{ partial "header.html" . }}
  <main class="site-main">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
</body>
</html>
