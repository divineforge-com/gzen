{{ define "main" }}
<div class="page-header">
  <h1>搜索</h1>
  <p class="page-desc">按关键词或标签搜索所有笔记与资料。</p>
</div>
<div class="search-page">
  <form id="search-form" class="search-page-form">
    <input type="text" id="search-query" class="search-page-input" placeholder="输入关键词搜索…" aria-label="搜索关键词" autofocus>
    <button type="submit" class="search-btn search-btn-lg">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
  </form>
  <div id="search-results" class="search-results" aria-live="polite"></div>
</div>
<script>
(function() {
  var idx = null;
  var pages = [];

  function loadIndex(cb) {
    fetch('/index.json')
      .then(function(r) { return r.json(); })
      .then(function(data) { pages = data; cb(); })
      .catch(function() { document.getElementById('search-results').innerHTML = '<p class="search-msg">搜索索引不可用。</p>'; });
  }

  function normalize(s) {
    return (s || '').toLowerCase();
  }

  function search(q) {
    var terms = normalize(q).split(/\s+/).filter(Boolean);
    if (!terms.length) return [];
    return pages.filter(function(p) {
      var haystack = normalize(p.title) + ' ' + normalize(p.summary) + ' ' + normalize((p.tags || []).join(' ')) + ' ' + normalize(p.section);
      return terms.every(function(t) { return haystack.indexOf(t) !== -1; });
    });
  }

  function renderResults(results, q) {
    var el = document.getElementById('search-results');
    if (!results.length) {
      el.innerHTML = '<p class="search-msg">未找到 <strong>' + escHtml(q) + '</strong> 相关内容。</p>';
      return;
    }
    var html = '<p class="search-msg">找到 ' + results.length + ' 条结果</p><ul class="post-list">';
    results.forEach(function(p) {
      var tags = (p.tags || []).map(function(t) {
        return '<a href="/tags/' + encodeURIComponent(t) + '/" class="tag">' + escHtml(t) + '</a>';
      }).join(' ');
      html += '<li class="post-item"><a href="' + escHtml(p.url) + '">' + escHtml(p.title) + '</a>' +
        (p.summary ? '<p class="search-summary">' + escHtml(p.summary) + '</p>' : '') +
        (tags ? '<div class="post-tags">' + tags + '</div>' : '') +
        '</li>';
    });
    html += '</ul>';
    el.innerHTML = html;
  }

  function escHtml(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function runSearch() {
    var q = document.getElementById('search-query').value.trim();
    if (!q) { document.getElementById('search-results').innerHTML = ''; return; }
    if (!pages.length) { loadIndex(function() { renderResults(search(q), q); }); }
    else { renderResults(search(q), q); }
  }

  // Pre-fill query from URL param
  var params = new URLSearchParams(window.location.search);
  var qParam = params.get('q');
  if (qParam) {
    document.getElementById('search-query').value = qParam;
    loadIndex(function() { renderResults(search(qParam), qParam); });
  }

  document.getElementById('search-form').addEventListener('submit', function(e) {
    e.preventDefault();
    runSearch();
    var q = document.getElementById('search-query').value.trim();
    if (q) history.replaceState(null, '', '?q=' + encodeURIComponent(q));
  });

  var debounceTimer;
  document.getElementById('search-query').addEventListener('input', function() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(function() {
      if (pages.length) runSearch();
    }, 200);
  });
})();
</script>
{{ end }}
