{{ define "main" }}
<article class="post">
  <header class="post-header">
    <h1>{{ .Title }}</h1>
    {{ with .Params.ja }}<p class="post-title-ja">{{ . }}</p>{{ end }}
    {{ with .Params.en }}<p class="post-title-en">{{ . }}</p>{{ end }}
    <div class="post-meta">
      <time>{{ .Date.Format "2006年01月02日" }}</time>
      {{ with .Params.tags }}
      <div class="post-tags">
        {{ range . }}<a href="{{ "/tags/" | relURL }}{{ . | urlize }}" class="tag">{{ . }}</a>{{ end }}
      </div>
      {{ end }}
    </div>
  </header>
  <div class="post-content">
    {{ .Content }}
  </div>
</article>
{{ end }}
