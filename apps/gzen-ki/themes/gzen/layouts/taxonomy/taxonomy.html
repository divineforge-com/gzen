{{ define "main" }}
<div class="page-header">
  <h1>标签：{{ .Title }}</h1>
</div>
<ul class="post-list">
  {{ range .Pages }}
  <li class="post-item">
    <span class="post-date">{{ .Date.Format "2006-01-02" }}</span>
    <a href="{{ .RelPermalink }}">{{ .Title }}</a>
  </li>
  {{ end }}
</ul>
{{ end }}
