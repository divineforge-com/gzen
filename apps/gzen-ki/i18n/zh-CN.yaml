# GZen Ki — i18n overrides for zh-CN (extends Blowfish's built-in zh-CN.yaml)

# Override Blowfish's default UI strings to fit TCM notebook context
shortcode:
  recent_articles: "最新笔记"

recent:
  show_more: "查看全部笔记 →"

list:
  date_range: "{{ .StartDate }} — {{ .EndDate }}"

search:
