<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#245e40"/>
      <stop offset="100%" stop-color="#152e1f"/>
    </linearGradient>
  </defs>
  <!-- Jade square base -->
  <rect width="32" height="32" rx="6" fill="url(#g)"/>
  <!-- Subtle inner highlight — seal-stamp border feel -->
  <rect x="2" y="2" width="28" height="28" rx="4.5" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <!-- 気 — Japanese/unified Qi character -->
  <text x="16" y="24" font-family="'Hiragino Mincho ProN','Yu Mincho','Noto Serif SC',Georgia,serif"
        font-size="21" font-weight="700" fill="#f0ebe0" text-anchor="middle"
        letter-spacing="0">気</text>
</svg>
