name: Provision om.gzen.io

on:
  workflow_dispatch:

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        name: Create CF Pages project + DNS record
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          script: |
            const token = process.env.CF_TOKEN;
            const acct = process.env.CF_ACCT;

            // 1. Look up zone
            const zoneRes = await fetch(
              'https://api.cloudflare.com/client/v4/zones?name=gzen.io',
              { headers: { Authorization: `Bearer ${token}` } }
            );
            const zoneData = await zoneRes.json();
            const zoneId = zoneData.result[0].id;
            core.notice(`Zone ID: ${zoneId}`);

            // 2. Create pages project
            const pagesBody = {
              name: 'gzen-om',
              production_branch: 'main',
              build_config: {
                build_command: 'hugo --gc --minify',
                build_output_dir: 'public',
                root_dir: 'apps/gzen-om',
              },
              deployment_configs: {
                preview: { env_vars: { HUGO_VERSION: { value: '0.147.9' } } },
                production: { env_vars: { HUGO_VERSION: { value: '0.147.9' } } },
              },
            };
            const pagesRes = await fetch(
              `https://api.cloudflare.com/client/v4/accounts/${acct}/pages/projects`,
              {
                method: 'POST',
                headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(pagesBody),
              }
            );
            const pagesData = await pagesRes.json();
            if (pagesData.success) {
              core.notice(`Pages project created: ${pagesData.result.subdomain}`);
            } else {
              core.setFailed(`Pages error: ${JSON.stringify(pagesData.errors)}`);
              return;
            }

            // 3. Add DNS CNAME record
            const dnsBody = {
              type: 'CNAME',
              name: 'om',
              content: pagesData.result.subdomain,
              ttl: 120,
              proxied: true,
            };
            const dnsRes = await fetch(
              `https://api.cloudflare.com/client/v4/zones/${zoneId}/dns_records`,
              {
                method: 'POST',
                headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(dnsBody),
              }
            );
            const dnsData = await dnsRes.json();
            if (dnsData.success) {
              core.notice(`DNS record created: om.gzen.io → ${pagesData.result.subdomain}`);
            } else {
              core.setFailed(`DNS error: ${JSON.stringify(dnsData.errors)}`);
            }
