name: Deploy gzen.io (Cloudflare Pages)

on:
  push:
    branches: [main]
    paths:
      - "apps/gzen/**"
      - ".github/workflows/deploy-gzen.yml"
  workflow_dispatch:

concurrency:
  group: deploy-gzen
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    defaults:
      run:
        working-directory: apps/gzen
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/gzen/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (Astro)
        run: npm run build

      - name: Verify portal
        run: |
          test -f dist/index.html
          test -f dist/_redirects
          grep -q 'Observe' dist/index.html
          grep -q 'ki.gzen.io' dist/index.html
          grep -q 'om.gzen.io' dist/index.html
          echo "Portal checks passed"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=gzen --commit-dirty=true
          workingDirectory: apps/gzen
