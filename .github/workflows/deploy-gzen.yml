name: Deploy gzen.io (Cloudflare Pages)

on:
  push:
    branches: [main]
    paths:
      - "apps/gzen/**"
      - ".github/workflows/deploy-gzen.yml"
  workflow_dispatch:

concurrency:
  group: deploy-gzen
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    defaults:
      run:
        working-directory: apps/gzen
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.147.9"
          extended: true

      - name: Build
        run: hugo --gc --minify

      - name: Verify portal
        run: |
          test -f public/index.html
          test -f public/_redirects
          grep -q 'Observe first' public/index.html
          grep -q 'ki.gzen.io' public/index.html
          grep -q 'om.gzen.io' public/index.html
          grep -q 'Kilo' public/index.html
          test ! -d public/blog
          echo "Portal checks passed"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=gzen --commit-dirty=true
          workingDirectory: apps/gzen
