name: Deploy gzen-om (Cloudflare Pages)

on:
  push:
    branches: [main]
    paths:
      - "apps/gzen-om/**"
      - ".github/workflows/deploy-gzen-om.yml"
  workflow_dispatch:

concurrency:
  group: deploy-gzen-om
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    defaults:
      run:
        working-directory: apps/gzen-om
    steps:
      - uses: actions/checkout@v4
      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.147.9"
          extended: true
      - run: hugo --gc --minify
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=gzen-om --commit-dirty=true
          workingDirectory: apps/gzen-om
