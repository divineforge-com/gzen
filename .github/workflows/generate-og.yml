name: Generate Open Graph Images

on:
  push:
    paths:
      - 'content/**/*.md'
  workflow_dispatch:

jobs:
  generate-images:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow

      - name: Generate images
        run: |
          python3 scripts/generate_og_images.py

      - name: Apply feature images to frontmatter
        run: |
          python3 scripts/apply_feature_images.py

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: Auto-generate Open Graph images"
          file_pattern: 'content/**/*.md assets/img/*.jpg'
